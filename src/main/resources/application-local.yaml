spring:
  datasource:
    url: jdbc:h2:mem:db
    username: sa
    password: sa
  jpa:
    show-sql: true
  h2:
    console:
      enabled: true
  web:
    error:
      include-binding-errors: always
      include-stacktrace: always
      include-exception: true

logging:
  file:
    path: ./logs

jwt:
  secret: ${JWT_SECRET}
  issuer: ${JWT_ISSUER}
  expire-hours: ${JWT_EXPIRE_HOURS}
  admin-expire-hours: ${JWT_ADMIN_EXPIRE_HOURS}